<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tron V7</title>
    <style>
        body { background: #05080f; color: #f7931a; font-family: sans-serif; margin: 0; }
        header { padding: 15px; border-bottom: 1px solid #1a2540; text-align: center; }
        #chart { height: 80vh; width: 100%; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #090d18; }
        nav button { flex: 1; padding: 20px; color: #d0dff8; background: none; border: none; }
    </style>
</head>
<body>
    <header>TRON V7 - TRADING ENGINE</header>
    <div id="chart"></div>
    <nav>
        <button onclick="change('BINANCE:BTCUSDT')">BTC</button>
        <button onclick="change('CAPITALCOM:US500')">S&P500</button>
    </nav>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        var w;
        function change(s) { w = new TradingView.widget({"container_id":"chart","autosize":true,"symbol":s,"interval":"15","theme":"dark"}); }
        change("BINANCE:BTCUSDT");
    </script>
</body>
</html>
